<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>学习时长统计</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial, sans-serif; background: #f4f6fb; color: #111; padding: 20px; }
h1 { text-align:center; }
button { padding: 10px 20px; margin: 5px; font-size:16px; }
#timer { font-size: 32px; margin: 20px 0; text-align:center; }
canvas { max-width: 800px; margin: 30px auto; display:block; background:white; border-radius:12px; padding:20px; }
</style>
</head>
<body>

<h1>每日学习时长统计</h1>
<div id="timer">00:00:00</div>
<div style="text-align:center;">
  <button id="startBtn">开始</button>
  <button id="pauseBtn">暂停</button>
  <button id="resetBtn">重置</button>
</div>

<canvas id="chart"></canvas>

<script>
let startTime = null;
let elapsed = 0; // 已累计时间（毫秒）
let timerInterval = null;

const timerDisplay = document.getElementById("timer");
const startBtn = document.getElementById("startBtn");
const pauseBtn = document.getElementById("pauseBtn");
const resetBtn = document.getElementById("resetBtn");

function formatTime(ms){
  let totalSec = Math.floor(ms/1000);
  let h = Math.floor(totalSec/3600).toString().padStart(2,'0');
  let m = Math.floor((totalSec%3600)/60).toString().padStart(2,'0');
  let s = (totalSec%60).toString().padStart(2,'0');
  return `${h}:${m}:${s}`;
}

function updateDisplay(){
  let ms = elapsed;
  if(startTime) ms += Date.now() - startTime;
  timerDisplay.innerText = formatTime(ms);
}

startBtn.onclick = () => {
  if(!startTime){
    startTime = Date.now();
    timerInterval = setInterval(updateDisplay, 500);
  }
};

pauseBtn.onclick = () => {
  if(startTime){
    elapsed += Date.now() - startTime;
    startTime = null;
    clearInterval(timerInterval);
    saveTodayTime();
  }
};

resetBtn.onclick = () => {
  if(startTime){ clearInterval(timerInterval); startTime=null; }
  elapsed = 0;
  updateDisplay();
  saveTodayTime(true);
};

// 数据存储
function getData(){ return JSON.parse(localStorage.getItem("studyTime")||"{}"); }
function saveData(data){ localStorage.setItem("studyTime", JSON.stringify(data)); }

function saveTodayTime(reset=false){
  const today = new Date().toISOString().slice(0,10);
  const data = getData();
  if(reset) data[today] = 0;
  else data[today] = (elapsed || 0);
  saveData(data);
  updateChart();
}

// 图表
const ctx = document.getElementById("chart").getContext("2d");
let chart = null;

function updateChart(){
  const data = getData();
  const labels = Object.keys(data).sort();
  const values = labels.map(d => Math.floor(data[d]/1000/60)); // 分钟
  if(chart) chart.destroy();
  chart = new Chart(ctx,{
    type:'bar',
    data:{
      labels: labels,
      datasets:[{
        label:'每日学习时长 (分钟)',
        data: values,
        backgroundColor:'rgba(38, 115, 255, 0.6)'
      }]
    },
    options:{
      scales:{ y:{ beginAtZero:true } },
      responsive:true,
      maintainAspectRatio:false
    }
  });
}

updateDisplay();
updateChart();

</script>
</body>
</html>
